name: Monthly Scrape Biligame Uma Skills

on:
  schedule:
    - cron: '0 0 1-7 * 2'   # UTC 00:00，在每月 1-7 日的星期二觸發
  workflow_dispatch:     # 手動 trigger 都得

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests beautifulsoup4 playwright

    - name: Install Playwright browser
      run: python -m playwright install --with-deps chromium

    - name: Scrape skills
      run: python scrape.py   # 你下面要寫嘅 Python 腳本

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 用 PAT 設定 remote URL，讓 push 用 token 認證
        git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/AaronFung3/uma-skills-zh-json.git
        
        git add skills.json
        git commit -m "Auto update: Monthly scrape from Biligame" || echo "No changes to commit"
        git push origin HEAD:main || echo "Push skipped (no changes or already up-to-date)"
